server:
  host: "0.0.0.0"
  port: 8081
  mode: "debug"  # debug | release

database:
  path: "./data/embrionix.db"

logging:
  level: "info"  # debug | info | warn | error
  file: "./logs/embrionix.log"

polling:
  interval_seconds: 30
  timeout_seconds: 10
  retry_count: 2
  icmp_enabled: true             # run the independent per-path reachability probe each cycle
  blue_probe: "icmp"             # how to check the Blue path: "icmp" (OS ping) or "tcp" (connect :80).
                                 #   EM6 Blue interfaces answer ICMP but not TCP, so "icmp" is the default.
                                 #   Red is always probed via TCP (it runs the HTTP management API).
  history_retention_days: 30     # poll history older than this is pruned daily (0 = keep forever)
  full_every: 10                 # every Nth cycle does a full poll (all endpoints); others fetch only
                                 #   dynamic health (~6 reqs vs ~17). At interval 30s, full poll ≈ every 5 min.
  max_concurrent_polls: 8        # cap simultaneous device polls so a large fleet doesn't burst the network

alerting:
  temp_warning_c: 70             # core temp (°C) that raises a warning
  temp_critical_c: 75            # core temp (°C) that raises a critical alarm
  response_warning_ms: 2000      # API response time (ms) that raises a warning
  webhook_url: ""                # generic/Slack-compatible incoming webhook; empty disables notifications
  webhook_on:                    # fire a webhook when a device transitions INTO one of these states
    - critical
    - offline

reports:
  enabled: false                 # OFF by default. The PDF report is always available on demand;
                                 #   this only controls the scheduled webhook delivery of a text summary.
  cron: "0 8 * * 1"              # standard 5-field cron — default: Mondays at 08:00. Needs alerting.webhook_url.

updates:
  enabled: true                  # check GitHub Releases for a newer version and allow admin self-update
  repo: "jojo024/Embrionix-Dashboard"   # GitHub "owner/name" to check for releases
  check_interval_hours: 6        # how often to poll for new releases (min 1h)
  restart_mode: "self"           # how to restart after a self-update:
                                 #   "self" — relaunch itself (use when running the binary directly)
                                 #   "exit" — just exit and let the service manager restart it
                                 #            (REQUIRED when running under systemd / NSSM / a Windows service)

auth:
  enabled: false                 # OFF by default — the dashboard runs with no login.
  jwt_secret: ""                 # REQUIRED when enabled (set a long random string / EMB_AUTH_JWT_SECRET)
  token_ttl_hours: 12            # login token lifetime
  admin_username: "admin"        # seeded on first start when enabled
  admin_password: ""             # blank → a random password is generated and logged once
  api_key: ""                    # optional static key (X-API-Key header, admin-equivalent) for integrations

cors:
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
