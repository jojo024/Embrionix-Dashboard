name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Embed frontend into the binary
        run: |
          rm -rf internal/webui/dist
          mkdir -p internal/webui/dist
          cp -r web/dist/* internal/webui/dist/

      - name: Build backend (self-contained binary)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p release
          go build \
            -ldflags="-s -w -X github.com/embrionix/dashboard/internal/version.Version=${{ github.ref_name }}" \
            -o release/embrionix-dashboard-${{ matrix.suffix }}${{ matrix.ext }} \
            ./cmd/server/

      - name: Checksum
        working-directory: release
        run: sha256sum embrionix-dashboard-${{ matrix.suffix }}${{ matrix.ext }} > embrionix-dashboard-${{ matrix.suffix }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/embrionix-dashboard-${{ matrix.suffix }}${{ matrix.ext }}
            release/embrionix-dashboard-${{ matrix.suffix }}.sha256
          draft: true
          generate_release_notes: true

  # Aggregate the per-asset checksums into a single checksums.txt that the
  # in-app self-updater reads to verify a downloaded binary.
  checksums:
    name: Publish checksums.txt
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Collect checksums from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sha256" --dir sums
          # Each .sha256 is "<hash>  <filename>"; concatenate into checksums.txt
          cat sums/*.sha256 > checksums.txt
          cat checksums.txt

      - name: Upload checksums.txt
        uses: softprops/action-gh-release@v2
        with:
          files: checksums.txt
          draft: false
